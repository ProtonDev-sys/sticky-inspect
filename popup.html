<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sticky Inspect</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <h1>Sticky Inspect</h1>
      <p id="status" class="status">Checking current tab...</p>
      <p id="pageKey" class="page-key"></p>
      <section class="actions">
        <button id="pickButton" type="button">Pick Element</button>
        <button id="applyButton" type="button">Apply Saved Rules</button>
        <button id="clearButton" type="button">Clear Saved Rules</button>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
